apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 1h

  targetNamespace: cert-manager

  chart:
    spec:
      chart: cert-manager
      version: "v1.18.*"

      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system

  install:
    createNamespace: true
    crds: CreateReplace

  upgrade:
    crds: CreateReplace