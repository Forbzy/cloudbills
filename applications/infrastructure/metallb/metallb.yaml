apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: flux-system
spec:
  interval: 1h

  targetNamespace: metallb-system

  chart:
    spec:
      chart: metallb
      version: "0.14.x"

      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system

      interval: 1h

  install:
    createNamespace: true
    crds: CreateReplace

  upgrade:
    crds: CreateReplace

  values:
    speaker:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule