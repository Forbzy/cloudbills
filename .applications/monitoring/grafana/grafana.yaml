apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 1h

  targetNamespace: monitoring

  chart:
    spec:
      chart: grafana
      version: "10.*"

      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  install:
    createNamespace: true