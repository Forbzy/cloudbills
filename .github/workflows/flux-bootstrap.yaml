name: Terraform

on:
  workflow_run:
    workflows: ["Terraform"]
    types:
      - completed
      
  pull_request:
    paths:
      - "terraform/**"

  push:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  contents: read

jobs:
    
  bootstrap:

    name: Bootstrap Flux

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    environment: develop

    permissions:
      contents: write

    defaults:
      run:
        working-directory: terraform/oracleCloud/environments/develop

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          pip3 install oci-cli

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci

          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem

          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

      - name: Create kubeconfig
        run: |
          mkdir -p ~/.kube

          oci ce cluster create-kubeconfig \
            --cluster-id ${{ needs.apply.outputs.cluster_id }} \
            --file ~/.kube/config \
            --region ${{ secrets.OCI_REGION }} \
            --token-version 2.0.0
        env:
          TF_VAR_oci_region: ${{ secrets.OCI_REGION }}

      - name: Install Flux CLI
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Check Flux
        id: flux_check
        continue-on-error: true
        run: |
          kubectl get namespace flux-system

          flux check --pre

      - name: Bootstrap Flux
        if: steps.flux_check.outcome == 'failure'
        run: |
          flux bootstrap github \
            --owner Forbzy \
            --repository cloudbills \
            --branch main \
            --path gitops/clusters/develop \
            --personal
        env:
          GITHUB_TOKEN: ${{ secrets.FLUX_GITHUB_TOKEN }}